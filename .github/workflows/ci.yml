name: CI

on:
  push:
    branches: [ main, master, "claude/**" ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  crypto:
    name: crypto (pure-JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # The whole crypto suite is pure-JVM (no liboqs/JNI, no Android SDK), so it
      # runs standalone on a plain Linux runner.
      - name: Test crypto module
        run: ./gradlew -p crypto test --no-daemon --stacktrace

      # Republish com.aura:aura-crypto into the in-repo Maven repo so the app
      # build below resolves the freshly-built artifact.
      - name: Publish aura-crypto into libs/maven
        run: ./gradlew -p crypto publish --no-daemon --stacktrace

      - name: Upload crypto test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-test-report
          path: crypto/build/reports/tests/test
          if-no-files-found: ignore

  app:
    name: app (Robolectric)
    runs-on: ubuntu-latest
    needs: crypto
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # aura-crypto is vendored in libs/maven, but rebuild + republish it first so
      # app tests always run against the current crypto sources.
      - name: Publish aura-crypto into libs/maven
        run: ./gradlew -p crypto publish --no-daemon --stacktrace

      - name: Run app unit tests (Robolectric)
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload app test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
